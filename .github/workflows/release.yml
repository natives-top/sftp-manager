name: Build & Release

on:
  push:
    tags:
      - 'v*'          # 推送 v 开头的 tag 时触发，例如 v1.0.0
  workflow_dispatch:   # 支持手动触发

permissions:
  contents: write

jobs:
  build:
    name: Build Portable EXE
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build & Package
        run: npm run dist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sftp-manager-portable
          path: release/现代化 SFTP 文件管理.exe

      - name: Create GitHub Release & Upload EXE
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: 现代化 SFTP 文件管理 ${{ github.ref_name }}
          body: |
            ## 现代化 SFTP 文件管理 ${{ github.ref_name }}

            ### 使用方式
            下载下方 `现代化.SFTP.文件管理.exe`，双击即可运行，无需安装。

            ### 更新内容
            请查看 [Commits](https://github.com/${{ github.repository }}/commits/${{ github.ref_name }}) 了解详情。
          files: release/现代化 SFTP 文件管理.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
