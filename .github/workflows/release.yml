name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
            script: dist:win
            artifact_name: sftp-manager-windows
            artifact_path: release/现代化 SFTP 文件管理-win32-x64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build & Package
        run: npm run ${{ matrix.script }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cleanup release artifacts
        run: npm run cleanup

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}

  release:
    name: Create Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: 现代化 SFTP 文件管理 ${{ github.ref_name }}
          body: |
            ## 现代化 SFTP 文件管理 ${{ github.ref_name }}

            ### 下载

            | 平台 | 文件 | 说明 |
            |------|------|------|
            | Windows | `现代化 SFTP 文件管理-win32-x64/` | 完整应用目录 |

            ### 特性
            - 支持 SFTP 文件管理（上传/下载/删除/创建文件夹）
            - 多选文件批量下载优化 - 单次选择下载目录
            - 路径别名功能 - 为书签添加自定义别名
            - 完整的中英文界面支持
            - 单机便携应用，无需安装

            ### 更新内容
            请查看 [Commits](https://github.com/${{ github.repository }}/commits/${{ github.ref_name }}) 了解详情。
          files: |
            artifacts/sftp-manager-windows/**
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
